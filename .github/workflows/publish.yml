name: Update VCTM Branch

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'vctm/**'

permissions:
  contents: write

jobs:
  update-vctm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install mtcvctm
        run: go install github.com/sirosfoundation/mtcvctm/cmd/mtcvctm@v1.8.0

      - name: Copy supplementary files to output
        run: |
          mkdir -p ./dist
          cp -v vctm/*.md ./dist/ 2>/dev/null || true

      - name: Publish VCTM files to vctm branch
        run: mtcvctm publish-vctm --input ./vctm --output ./dist --github-action --vctm-branch vctm --inline-images
