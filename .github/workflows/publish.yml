name: Publish VCTM Registry

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'vctm/**'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install mtcvctm
        run: go install github.com/sirosfoundation/mtcvctm/cmd/mtcvctm@v1.5.0

      - name: Publish VCTM files to vctm branch
        run: mtcvctm publish-vctm --input ./vctm --output ./dist --github-action --vctm-branch vctm
