name: Publish VCTM Registry

on:
  # Manual trigger
  workflow_dispatch:
  
  # On push to main branch
  push:
    branches:
      - main
    paths:
      - 'vctm/**'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install mtcvctm
        run: go install github.com/sirosfoundation/mtcvctm/cmd/mtcvctm@v1.5.0

      - name: Publish VCTM files
        run: |
          mkdir -p dist
          mtcvctm publish-vctm --input ./vctm --output ./dist

      - name: List published files
        run: |
          echo "Published files:"
          find dist -type f
          echo ""
          echo "Registry content:"
          cat dist/.well-known/vctm-registry.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
